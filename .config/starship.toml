# Starship Prompt Configuration
# Docs: https://starship.rs/config/

format = """
[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ>](bold green)
[в”Ӯ](bold green)$directory$git_branch$git_status
[в””в”Җ>](bold green) $character"""

[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вһң](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "вҡ”пёҸ "
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "рҹӨ·вҖҚ"
stashed = "рҹ“Ұ"
modified = "рҹ“қ"
staged = '[++\($count\)](green)'
renamed = "рҹ‘…"
deleted = "рҹ—‘"

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = " "
style = "bold yellow"

[rust]
symbol = " "
style = "bold orange"

[java]
symbol = " "
style = "bold red"

[golang]
symbol = " "
style = "bold cyan"

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow)"
